<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BTC ORB Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#12121a;--surface2:#1a1a26;--border:#2a2a3a;--text:#e8e8f0;--muted:#6b6b8a;--bull:#00e5a0;--bear:#ff4d6d;--orange:#ff9500}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;height:100vh;overflow:hidden}
.splash{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;z-index:9999}
.splash-title{font-family:'Space Mono',monospace;font-size:42px;font-weight:700;letter-spacing:-2px}
.splash-title span{color:var(--orange)}
.app{opacity:0;transition:opacity .6s;padding-bottom:80px}
.card{margin:16px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:20px}
.verdict-card{text-align:center;border:2px solid var(--border);border-radius:24px;padding:30px 20px}
.v-word{font-size:52px;font-weight:700;letter-spacing:-3px}
.v-conf{font-family:'Space Mono',monospace;font-size:17px;padding:10px 24px;border-radius:999px;margin-top:12px}
.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:var(--surface2);padding:12px 20px;border-radius:12px;font-size:13px;z-index:9999;opacity:0;transition:all .4s}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash" class="splash">
  <div class="splash-title">BTC/<span>ORB</span></div>
  <div style="height:3px;width:120px;background:linear-gradient(90deg,transparent,#ff9500,transparent);margin-top:20px"></div>
</div>

<!-- MAIN APP -->
<div class="app" id="app">

  <div style="padding:50px 20px 10px;text-align:center">
    <div style="font-size:11px;color:var(--muted);letter-spacing:2px">KALSHI ORB STRATEGY</div>
    <div style="font-family:'Space Mono',monospace;font-size:28px;margin-top:4px">BTC <span style="color:var(--orange)">USD</span></div>
  </div>

  <!-- Risk Modes -->
  <div style="display:flex;gap:8px;padding:0 16px">
    <div onclick="setRisk('low')" id="rm-low" style="flex:1;background:rgba(0,229,160,.1);border:2px solid #00e5a0;border-radius:16px;padding:14px;text-align:center;cursor:pointer">LOW</div>
    <div onclick="setRisk('med')" id="rm-med" style="flex:1;background:rgba(255,214,10,.1);border:2px solid #ffd60a;border-radius:16px;padding:14px;text-align:center;cursor:pointer">MED</div>
    <div onclick="setRisk('high')" id="rm-high" style="flex:1;background:rgba(255,77,109,.1);border:2px solid #ff4d6d;border-radius:16px;padding:14px;text-align:center;cursor:pointer">HIGH</div>
  </div>

  <!-- Verdict -->
  <div class="card verdict-card" id="verdict" style="margin-top:20px">
    <div id="lockBadge" style="display:none;background:rgba(255,149,0,.2);color:var(--orange);padding:6px 14px;border-radius:999px;font-size:11px;margin-bottom:12px">🔒 LOCKED AT WINDOW OPEN</div>
    <div id="emoji" style="font-size:68px;margin-bottom:8px">⏳</div>
    <div id="word" style="font-size:54px;font-weight:700;letter-spacing:-2px;color:var(--muted)">WAIT</div>
    <div id="sub" style="color:var(--muted);margin:8px 0 16px">Observing market data...</div>
    <div id="conf" style="background:var(--surface2);color:var(--orange);padding:10px 24px;border-radius:999px;font-family:'Space Mono',monospace;font-size:16px">50% CONFIDENCE</div>
  </div>

  <!-- Price -->
  <div class="card" style="text-align:center">
    <div id="price" style="font-family:'Space Mono',monospace;font-size:38px;font-weight:700">$70,842</div>
    <div style="font-size:11px;color:var(--muted)" id="status">Simulated • Updated just now</div>
  </div>

  <div style="text-align:center;margin-top:30px;color:#555;font-size:12px">
    Data is simulated (real APIs blocked by browser)<br>
    Change risk mode or wait 15 seconds for lock
  </div>
</div>

<script>
// =============== FULL WORKING SCRIPT ===============
let riskMode = 'low';
let predictionLocked = false;
let observationStart = Date.now();
let price = 70842;

const riskConfigs = {
  low:  { color: '#00e5a0', threshold: 0.22 },
  med:  { color: '#ffd60a', threshold: 0.11 },
  high: { color: '#ff4d6d', threshold: 0.05 }
};

function $(id){ return document.getElementById(id); }

function setRisk(mode){
  riskMode = mode;
  document.querySelectorAll('#rm-low,#rm-med,#rm-high').forEach(el => {
    el.style.borderColor = '#2a2a3a';
    el.style.background = 'rgba(255,255,255,0.03)';
  });
  $(`rm-${mode}`).style.borderColor = riskConfigs[mode].color;
  updateUI();
}

function updateUI(){
  const timeSinceStart = Date.now()
