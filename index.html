// Toast
function showToast(msg){
  let t = document.createElement('div');
  t.className='toast show';
  t.innerHTML = msg;
  document.body.appendChild(t);
  setTimeout(()=>{ t.style.opacity=0; setTimeout(()=>t.remove(),300); },2800);
}

// ====================== CORE FIXES ======================

// Better proxy fetch with timeout and error handling
async function proxiedFetch(url, timeout=8000){
  const controller = new AbortController();
  const id = setTimeout(()=>controller.abort(), timeout);
  try {
    const res = await fetch(url, {signal: controller.signal});
    clearTimeout(id);
    if (!res.ok) throw new Error('HTTP '+res.status);
    return res;
  } catch(e){
    clearTimeout(id);
    throw e;
  }
}

// Fixed & robust candle fetch
async function fetchCandles(){
  try {
    const url = `https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=${candleTF}&limit=30`;
    const r = await proxiedFetch(url, 7000);
    const data = await r.json();
    
    if (!Array.isArray(data)) {
      console.warn("Binance returned non-array:", data);
      throw new Error("Invalid response format");
    }
    
    return data.map(c => ({
      open: parseFloat(c[1]),
      high: parseFloat(c[2]),
      low: parseFloat(c[3]),
      close: parseFloat(c[4]),
      vol: parseFloat(c[5]),
      time: c[0]
    }));
  } catch(e){
    console.error("Candle fetch failed:", e);
    // Fallback synthetic data so UI never breaks
    return Array.from({length:20}, (_,i) => {
      const base = state.price || 85000;
      return {open:base*(0.995+i*0.0005), high:base*1.008, low:base*0.992, close:base*(1+i*0.0008), vol:1200, time:Date.now()-i*60000};
    });
  }
}
