function showToast(msg, duration=2800){
  const t = document.createElement('div');
  t.className = 'toast show';
  t.style.cssText = 'background:var(--surface2);border:1px solid var(--orange);color:var(--text);';
  t.innerHTML = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity = 0; setTimeout(() => t.remove(), 400); }, duration);
}

// Safe fetch with timeout + fallback
async function safeFetch(url, timeout=7000){
  const controller = new AbortController();
  setTimeout(() => controller.abort(), timeout);
  try {
    const r = await fetch(url, { signal: controller.signal });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return await r.json();
  } catch(e){
    return null;
  }
}

// Improved price streaming - tries multiple endpoints
async function streamPrice(){
  const endpoints = [
    'https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT',
    'https://api.coinbase.com/v2/prices/BTC-USD/spot',
    'https://api.kraken.com/0/public/Ticker?pair=XBTUSD'
  ];

  for (const url of endpoints){
    const data = await safeFetch(url);
    if (!data) continue;

    let p = null;
    if (url.includes('binance') && data.price) p = parseFloat(data.price);
    else if (url.includes('coinbase') && data.data?.amount) p = parseFloat(data.data.amount);
    else if (url.includes('kraken') && data.result?.XBTUSD?.c?.[0]) p = parseFloat(data.result.XBTUSD.c[0]);

    if (p && p > 50000){
      state.prevPrice = state.price;
      state.price = p;
      state.usingSimulated = false;

      $('btcPrice').textContent = '$' + p.toLocaleString();
      $('nowPrice').textContent = '$' + p.toLocaleString();
      $('lastUpdate').textContent = 'Updated ' + new Date().toLocaleTimeString();

      if (state.prevPrice && Math.abs(p - state.prevPrice) > 5){
        const el = $('btcPrice');
        el.classList.add(p > state.prevPrice ? 'flash-up' : 'flash-dn');
        setTimeout(() => el.classList.remove('flash-up','flash-dn'), 700);
      }
      priceHistory.push(p);
      if (priceHistory.length > 30) priceHistory.shift();
      updateVerdict();
      setApiStatus('ok', '✅ Live data connected');
      return true;
    }
  }

  // Fallback: keep realistic simulated price around current market (~$70,800 - $71,000)
  if (!state.usingSimulated || Math.random() < 0.15){
    state.price = 70800 + Math.floor(Math.random()*400 - 150);
    state.usingSimulated = true;
    $('btcPrice').textContent = '$' + state.price.toLocaleString();
    $('lastUpdate').textContent = 'Using simulated data (APIs blocked by browser)';
    setApiStatus('warn', '⚠️ Simulated data — real APIs blocked by CORS');
    updateVerdict();
  }
  return false;
}
